apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-tracker
  labels:
    app: poker-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poker-tracker
  template:
    metadata:
      labels:
        app: poker-tracker
    spec:
      containers:
        - name: poker-tracker
          image: localhost:5000/poker-tracker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: poker-tracker
  labels:
    app: poker-tracker
spec:
  type: NodePort
  selector:
    app: poker-tracker
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30080
