<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页 - 德州扑克计分器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f2f5fa 0%, #e6ecf4 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1.5rem;
            padding-bottom: 6rem;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(255,255,255,0.68);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
        }
        .glass-strong {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .input-glass {
            background: rgba(255,255,255,0.5);
            border: 1.5px solid rgba(60,60,67,0.1);
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.8);
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
        }
        .btn-primary {
            background: #007AFF;
            box-shadow: 0 4px 16px rgba(0,122,255,0.25);
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,122,255,0.35);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary {
            background: rgba(255,255,255,0.9);
            border: 1.5px solid rgba(60,60,67,0.12);
            color: #1c1c1e;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
            cursor: pointer;
        }
        .btn-secondary:hover { background: white; transform: translateY(-1px); }
        .btn-secondary:active { transform: scale(0.97); }
        .card-enter { animation: cardFadeIn 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .section-title {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: #8e8e93;
            padding-bottom: 0.75rem; margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(60,60,67,0.08);
        }
        .room-card {
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
        }
        .room-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body class="max-w-lg mx-auto relative">
    <div class="glass-strong sticky top-3 z-40 rounded-2xl px-5 py-3 mb-6 flex justify-between items-center">
        <div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center text-lg shadow-sm" style="background:rgba(255,255,255,0.85);">
                    <span th:text="${avatar != null ? avatar : '🦁'}" style="line-height:1;"></span>
                </div>
                <div>
                    <h1 class="text-lg font-black text-gray-800">德扑计分器</h1>
                    <span class="text-xs font-semibold text-gray-400" th:text="'欢迎, ' + ${nickname}"></span>
                </div>
            </div>
        </div>
        <a href="/logout" class="text-xs font-semibold text-gray-400 hover:text-red-500 transition-colors">
            <i class="fas fa-sign-out-alt mr-1"></i>退出
        </a>
    </div>

    <div th:if="${error}" class="bg-red-50/80 backdrop-blur-sm border border-red-200/60 text-red-600 p-3.5 rounded-xl mb-6 text-sm font-medium">
        <i class="fas fa-circle-exclamation text-red-400 mr-2"></i><span th:text="${error}">错误</span>
    </div>

    <!-- Create/Join Room -->
    <div class="glass rounded-2xl p-5 mb-6 card-enter">
        <div class="section-title flex items-center gap-2"><i class="fas fa-dice text-[#007AFF] text-xs"></i> 房间操作</div>
        <div class="space-y-3">
            <form action="/room/create" method="post" class="flex gap-2">
                <button type="submit" class="btn-primary flex-1 py-3 rounded-xl text-sm">
                    <i class="fas fa-plus-circle mr-1.5"></i>创建房间
                </button>
            </form>
            <form action="/room/join" method="post" class="flex gap-2">
                <input type="text" name="roomId" required pattern="[0-9]{6}" placeholder="输入6位房号加入" class="input-glass flex-1 px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400 text-center font-bold tracking-widest">
                <button type="submit" class="btn-secondary py-3 px-5 rounded-xl text-sm whitespace-nowrap">
                    <i class="fas fa-right-to-bracket mr-1"></i>加入
                </button>
            </form>
        </div>
    </div>

    <!-- My Rooms -->
    <div class="glass rounded-2xl p-5 mb-6 card-enter">
        <div class="section-title flex items-center gap-2"><i class="fas fa-door-open text-[#007AFF] text-xs"></i> 我的房间</div>
        <div th:if="${#lists.isEmpty(myRooms)}" class="text-center py-8">
            <i class="fas fa-cube text-gray-300 text-3xl mb-3"></i>
            <p class="text-sm text-gray-400 font-medium">还没有加入任何房间</p>
            <p class="text-xs text-gray-300 mt-1">创建一个或加入已有的房间开始游戏</p>
        </div>
        <div th:if="${!#lists.isEmpty(myRooms)}" class="space-y-2.5">
            <a th:each="room : ${myRooms}" th:href="@{'/room/' + ${room.roomId}}"
               class="room-card glass-strong rounded-xl p-4 flex items-center justify-between cursor-pointer block no-underline">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-white/80 flex items-center justify-center text-gray-500 text-sm shadow-sm">
                        <i class="fas fa-door-open"></i>
                    </div>
                    <div>
                        <div class="font-bold text-gray-800" th:text="'房间 ' + ${room.roomId}"></div>
                        <div class="text-xs text-gray-400">
                            <span th:text="${room.playerCount} + ' 人在线'"></span>
                            <span th:if="${room.game != null and !room.game.isFinished}" class="ml-2 text-[#007AFF]">游戏中</span>
                            <span th:if="${room.game != null and room.game.isFinished}" class="ml-2 text-[#ff9500]">等待中</span>
                        </div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </a>
        </div>
    </div>

    <!-- Available Rooms -->
    <div class="glass rounded-2xl p-5 card-enter">
        <div class="section-title flex items-center gap-2"><i class="fas fa-list text-[#007AFF] text-xs"></i> 可加入的房间</div>
        <div th:if="${#lists.isEmpty(availableRooms)}" class="text-center py-8">
            <i class="fas fa-check-circle text-green-300 text-3xl mb-3"></i>
            <p class="text-sm text-gray-400 font-medium">没有可加入的房间</p>
        </div>
       <div th:if="${!#lists.isEmpty(availableRooms)}" class="space-y-2.5">
            <form th:each="room : ${availableRooms}" th:action="@{'/room/join'}" method="post" class="block">
                <input type="hidden" name="roomId" th:value="${room.roomId}">
                <button type="submit"
                   class="room-card glass-strong rounded-xl p-4 flex items-center justify-between cursor-pointer w-full text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-white/80 flex items-center justify-center text-gray-500 text-sm shadow-sm">
                            <i class="fas fa-hashtag"></i>
                        </div>
                        <div>
                            <div class="font-bold text-gray-800" th:text="'房间 ' + ${room.roomId}"></div>
                            <div class="text-xs text-gray-400">
                                <span th:text="'创建者: ' + ${room.createdByNickname}"></span>
                                <span th:text="' | ' + ${room.playerCount} + ' 人在线'" class="ml-1"></span>
                            </div>
                        </div>
                    </div>
                    <span class="text-xs font-bold text-white bg-[#007AFF] px-3 py-1.5 rounded-lg shadow-sm">加入</span>
                </button>
            </form>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 text-center z-10">
        <a href="/rankings" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-semibold text-gray-400 hover:text-[#007AFF] bg-white/40 backdrop-blur-sm hover:bg-white/60 transition-all">
            <i class="fas fa-book"></i> 牌型大小参考
        </a>
    </div>

</body>
</html>
