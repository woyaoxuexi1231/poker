<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房间 - 德州扑克计分器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 30%, #fefce8 60%, #fce7f3 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Inter', system-ui, sans-serif;
            padding-bottom: 200px;
            overflow-x: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
        }
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            padding: 1rem 1.25rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.04);
            z-index: 50;
            max-width: 480px;
            margin: 0 auto;
            left: 0;
            right: 0;
            border-radius: 24px 24px 0 0;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .chip-btn {
            flex: 1;
            background: rgba(243, 244, 246, 0.8);
            border: 1px solid rgba(229, 231, 235, 0.5);
            color: #374151;
            padding: 0.7rem 0.5rem;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .chip-btn:hover { background: rgba(229, 231, 235, 0.9); transform: translateY(-1px); }
        .chip-btn:active { transform: scale(0.95); }
        .chip-btn.gold {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-color: transparent; color: #78350f;
            box-shadow: 0 2px 12px rgba(245, 158, 11, 0.25);
        }
        .chip-btn.emerald {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: transparent; color: white;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.25);
        }
        .chip-btn.rose {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border-color: transparent; color: white;
            box-shadow: 0 2px 12px rgba(244, 63, 94, 0.2);
        }
        .chip-btn.purple {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-color: transparent; color: white;
            box-shadow: 0 2px 12px rgba(139, 92, 246, 0.25);
        }
        .chip-btn.blue {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: transparent; color: white;
            box-shadow: 0 2px 12px rgba(59, 130, 246, 0.25);
        }
        .custom-bet-wrap {
            flex: 1.5;
            display: flex;
            gap: 4px;
            background: rgba(249, 250, 251, 0.6);
            border: 1.5px solid rgba(229, 231, 235, 0.5);
            border-radius: 14px;
            padding: 3px;
            transition: all 0.2s;
        }
        .custom-bet-wrap:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }
        .custom-bet-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: #374151;
            outline: none;
            min-width: 0;
            padding: 0.3rem;
        }
        .custom-bet-wrap input::placeholder { color: #9ca3af; font-weight: 500; }
        .player-card {
            transition: all 0.3s ease;
        }
        .player-card.is-me {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .player-card.folded {
            opacity: 0.5;
            filter: grayscale(80%);
        }
        .avatar-placeholder {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; color: white;
            flex-shrink: 0;
        }
        #toast-container {
            position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: calc(100% - 2rem); max-width: 400px;
            pointer-events: none; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .toast {
            pointer-events: auto;
            padding: 0.9rem 1.2rem; border-radius: 16px; font-weight: 600; font-size: 0.85rem;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 0.6rem;
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.out { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
        .toast.success { background: rgba(209, 250, 229, 0.9); border: 1px solid rgba(167, 243, 208, 0.5); color: #065f46; }
        .toast.error { background: rgba(254, 226, 226, 0.9); border: 1px solid rgba(252, 165, 165, 0.5); color: #991b1b; }
        .toast.info { background: rgba(219, 234, 254, 0.9); border: 1px solid rgba(191, 219, 254, 0.5); color: #1e40af; }
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 100; padding: 1.5rem;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 28px; padding: 1.75rem;
            width: 100%; max-width: 340px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.12);
        }
        .modal-btn {
            padding: 0.85rem; border-radius: 14px; font-weight: 700; font-size: 0.9rem;
            border: none; cursor: pointer; transition: all 0.2s;
        }
        .modal-btn:active { transform: scale(0.95); }
        .modal-input {
            width: 100%; background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(229, 231, 235, 0.6); border-radius: 14px;
            padding: 0.85rem 1rem; font-size: 1.2rem; font-weight: 700;
            color: #374151; outline: none; transition: all 0.2s; text-align: center;
        }
        .modal-input:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12); }
        .modal-select {
            width: 100%; background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(229, 231, 235, 0.6); border-radius: 14px;
            padding: 0.85rem 1rem; font-size: 0.95rem; font-weight: 600;
            color: #374151; outline: none; cursor: pointer;
        }
        .dropdown-content {
            display: none;
            position: absolute; right: 0; top: calc(100% + 6px);
            min-width: 180px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1); z-index: 60; overflow: hidden;
        }
        .dropdown.active .dropdown-content { display: block; }
        .dropdown-item {
            width: 100%; text-align: left; padding: 0.75rem 1rem;
            font-size: 0.85rem; font-weight: 600; color: #374151;
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .dropdown-item:hover { background: rgba(243, 244, 246, 0.6); }
        .dropdown-item.danger { color: #dc2626; }
        .dropdown-divider { height: 1px; background: rgba(229, 231, 235, 0.5); margin: 0.25rem 0; }
        .num-pop { animation: numPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes numPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pending-chip {
            animation: chipSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes chipSlide {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="max-w-md mx-auto relative min-h-screen">
    <div id="toast-container"></div>

    <!-- Header -->
    <div id="room-header" class="glass-strong sticky top-3 z-40 mx-3 mt-3 rounded-2xl px-4 py-3 flex justify-between items-center">
        <div>
            <div class="flex items-center gap-2">
                <h1 class="text-lg font-black text-gray-800">房间 <span id="display-room-id" class="text-emerald-600" th:text="${roomId}"></span></h1>
                <span id="game-status" class="text-[10px] px-2.5 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-500">等待中</span>
            </div>
            <div class="text-xs text-gray-400 font-medium mt-0.5" id="player-count">0 人在线</div>
        </div>
        <div class="dropdown" id="top-dropdown" style="position:relative;">
            <button onclick="toggleDropdown()" class="w-9 h-9 rounded-xl bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-all active:scale-90">
                <i class="fas fa-ellipsis"></i>
            </button>
            <div class="dropdown-content py-1">
                <button onclick="hideDropdown();showTransferModal()" class="dropdown-item"><i class="fas fa-exchange-alt text-blue-500"></i> 转移筹码</button>
                <button onclick="hideDropdown();showBorrowModal()" class="dropdown-item"><i class="fas fa-hand-holding-usd text-purple-500"></i> 借贷中心</button>
            </div>
        </div>
    </div>

    <!-- Main: Players list + Game info -->
    <div id="game-area" class="mx-3 mt-3">
        <!-- Game Info Banner -->
        <div id="game-info" class="glass rounded-2xl p-4 mb-3 text-center" style="display:none;">
            <div class="flex items-center justify-center gap-4">
                <div>
                    <div class="text-xs font-semibold text-gray-400">轮次</div>
                    <div class="text-xl font-black text-gray-800" id="round-display">1</div>
                </div>
                <div class="w-px h-8 bg-gray-200"></div>
                <div>
                    <div class="text-xs font-semibold text-gray-400">奖池</div>
                    <div class="text-xl font-black text-amber-600" id="pot-display">
                        <i class="fas fa-coins text-amber-400 mr-1 text-sm"></i><span id="pot-amount">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Players List -->
        <div id="players-container" class="space-y-2.5"></div>
    </div>

    <!-- Fixed Bottom Action Bar -->
    <div id="action-bar" class="action-bar" style="display:none;">
        <div id="my-info" class="flex items-center justify-between mb-3">
            <div>
                <span class="text-xs font-semibold text-gray-400">我的余额</span>
                <div class="text-lg font-black text-blue-600" id="my-balance">200</div>
            </div>
            <div class="text-right">
                <span class="text-xs font-semibold text-gray-400">待确认下注</span>
                <div class="text-lg font-black text-amber-500 pending-chip" id="my-pending">0</div>
            </div>
        </div>

        <!-- Bet Buttons -->
        <div id="bet-section">
            <div class="flex justify-between gap-2 mb-2">
                <button onclick="doBet(1)" class="chip-btn">+1</button>
                <button onclick="doBet(5)" class="chip-btn">+5</button>
                <button onclick="doBet(10)" class="chip-btn">+10</button>
                <button onclick="doBet(25)" class="chip-btn">+25</button>
                <button onclick="doBet(50)" class="chip-btn">+50</button>
            </div>
            <div class="flex gap-2 mb-2">
                <div class="custom-bet-wrap">
                    <input type="number" id="custom-bet" placeholder="自定义" min="1">
                    <button onclick="doBetCustom()" class="chip-btn gold">添加</button>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="confirmBetAction()" class="chip-btn emerald flex-1"><i class="fas fa-check mr-1"></i>确认下注</button>
                <button onclick="foldAction()" class="chip-btn rose"><i class="fas fa-times mr-1"></i>弃牌</button>
                <button onclick="winAction()" class="chip-btn purple"><i class="fas fa-trophy mr-1"></i>胜利</button>
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div id="transfer-modal" class="modal-overlay" onclick="if(event.target===this)closeModal('transfer-modal')">
        <div class="modal-card">
            <h2 class="text-xl font-black text-gray-800 mb-5 flex items-center gap-2"><i class="fas fa-exchange-alt text-blue-500 text-sm"></i> 转移筹码</h2>
            <select id="transfer-to" class="modal-select mb-3"></select>
            <input type="number" id="transfer-amount" placeholder="转移数量" class="modal-input mb-5" min="1">
            <div class="flex justify-end gap-2.5">
                <button onclick="closeModal('transfer-modal')" class="modal-btn" style="background:rgba(243,244,246,0.8);color:#374151;">取消</button>
                <button onclick="submitTransfer()" class="modal-btn" style="background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;">确认转移</button>
            </div>
        </div>
    </div>

    <!-- Borrow Modal -->
    <div id="borrow-modal" class="modal-overlay" onclick="if(event.target===this)closeModal('borrow-modal')">
        <div class="modal-card">
            <h2 class="text-xl font-black text-gray-800 mb-5 flex items-center gap-2"><i class="fas fa-hand-holding-usd text-purple-500 text-sm"></i> 向系统借贷</h2>
            <input type="number" id="borrow-amount" placeholder="借贷数量" class="modal-input mb-5" min="1">
            <div class="flex justify-end gap-2.5">
                <button onclick="closeModal('borrow-modal')" class="modal-btn" style="background:rgba(243,244,246,0.8);color:#374151;">取消</button>
                <button onclick="submitBorrow()" class="modal-btn" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;">确认借入</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const roomId = /*[[${roomId}]]*/ '000000';
        const myUserId = /*[[${userId}]]*/ 0;
        let stompClient = null;
        let roomData = null;
        let myPlayer = null;
        const avatarColors = ['#10b981','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#14b8a6','#6366f1'];

        // ── Toast ──
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const icons = { success: 'fa-check-circle', error: 'fa-circle-exclamation', info: 'fa-circle-info' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('out'); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // ── Dropdown ──
        function toggleDropdown() { document.getElementById('top-dropdown').classList.toggle('active'); }
        function hideDropdown() { document.getElementById('top-dropdown').classList.remove('active'); }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#top-dropdown')) hideDropdown();
        });

        // ── WebSocket ──
        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function () {
                stompClient.subscribe('/topic/room/' + roomId, function (message) {
                    const msg = JSON.parse(message.body);
                    if (msg.event === 'ROOM_UPDATE') {
                        roomData = msg.data;
                        renderRoom();
                    }
                });
                stompClient.send("/app/room/" + roomId + "/join", {}, {});
            });
        }

        // ── Render ──
        function renderRoom() {
            if (!roomData) return;

            const container = document.getElementById('players-container');
            const gameInfo = document.getElementById('game-info');
            const actionBar = document.getElementById('action-bar');
            const betSection = document.getElementById('bet-section');
            const transferSelect = document.getElementById('transfer-to');

            // Update header
            document.getElementById('player-count').innerText = (roomData.players || []).length + ' 人在线';

            // Game info
            const hasGame = roomData.game && !roomData.game.isFinished;
            if (hasGame) {
                gameInfo.style.display = 'block';
                document.getElementById('round-display').innerText = roomData.game.roundNumber;
                document.getElementById('pot-amount').innerText = roomData.game.pot;
                document.getElementById('game-status').innerText = '第 ' + roomData.game.roundNumber + ' 轮';
                document.getElementById('game-status').className = 'text-[10px] px-2.5 py-0.5 rounded-full font-semibold bg-emerald-100 text-emerald-700';
            } else {
                gameInfo.style.display = 'none';
                document.getElementById('game-status').innerText = '等待开始';
                document.getElementById('game-status').className = 'text-[10px] px-2.5 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-500';
            }

            // Find my player
            myPlayer = roomData.players ? roomData.players.find(p => p.userId === myUserId) : null;

            // Update transfer select
            transferSelect.innerHTML = '<option value="">选择目标玩家</option>';
            if (roomData.players) {
                roomData.players.forEach(p => {
                    if (p.userId !== myUserId && p.isActive) {
                        transferSelect.innerHTML += `<option value="${p.userId}">${p.nickname}</option>`;
                    }
                });
            }

            // Show/hide action bar
            if (myPlayer && hasGame && !myPlayer.isFolded && !myPlayer.isBetConfirmed) {
                actionBar.style.display = 'block';
                betSection.style.display = 'block';
            } else {
                actionBar.style.display = 'none';
            }

            if (myPlayer) {
                document.getElementById('my-balance').innerText = myPlayer.balance;
                document.getElementById('my-pending').innerText = myPlayer.pendingBet || 0;
            }

            // Render players
            container.innerHTML = '';
            if (roomData.players) {
                roomData.players.forEach((player, index) => {
                    const card = document.createElement('div');
                    const isMe = player.userId === myUserId;
                    const isFolded = hasGame && player.isFolded;
                    const color = avatarColors[index % avatarColors.length];

                    // Status indicators
                    let statusBadge = '';
                    if (isFolded) {
                        statusBadge = '<span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2 py-0.5 rounded-full">已弃牌</span>';
                    } else if (hasGame && player.isBetConfirmed) {
                        statusBadge = '<span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full">已下注</span>';
                    } else if (hasGame && !player.isFolded) {
                        statusBadge = '<span class="text-[10px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-full">下注中</span>';
                    }

                    // Bet info
                    let betHtml = '';
                    if (hasGame) {
                        if (player.pendingBet > 0) {
                            betHtml += `<span class="text-[11px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded">待确认 +${player.pendingBet}</span> `;
                        }
                        if (player.currentRoundBet > 0) {
                            betHtml += `<span class="text-[11px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">本轮 +${player.currentRoundBet}</span> `;
                        }
                        if (player.totalBet > 0) {
                            betHtml += `<span class="text-[11px] font-bold text-gray-500">累计 ${player.totalBet}</span>`;
                        }
                    }

                    card.className = `glass rounded-2xl p-4 player-card ${isMe ? 'is-me' : ''} ${isFolded ? 'folded' : ''}`;
                    card.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="avatar-placeholder" style="background:${color};">${player.nickname.charAt(0).toUpperCase()}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-gray-800 text-sm truncate">${player.nickname}</span>
                                    ${isMe ? '<span class="text-[9px] font-bold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded">我</span>' : ''}
                                    ${statusBadge}
                                </div>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-sm font-black" style="color:${isMe ? '#3b82f6' : '#059669'};">${player.balance}</span>
                                    ${player.borrowedTotal > 0 ? `<span class="text-[10px] text-amber-500 font-semibold">(欠 ${player.borrowedTotal})</span>` : ''}
                                </div>
                                ${betHtml ? '<div class="flex items-center gap-1 mt-1 flex-wrap">' + betHtml + '</div>' : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        // ── Actions ──
        function doBet(amount) {
            if (!myPlayer || myPlayer.isFolded || myPlayer.isBetConfirmed) return;
            stompClient.send("/app/room/" + roomId + "/bet", {}, JSON.stringify({ actionType: 'BET', amount: amount }));
        }

        function doBetCustom() {
            const val = parseInt(document.getElementById('custom-bet').value);
            if (val > 0) { doBet(val); document.getElementById('custom-bet').value = ''; }
            else showToast('请输入有效数量', 'error');
        }

        function confirmBetAction() {
            if (!myPlayer || myPlayer.pendingBet <= 0) {
                showToast('请先添加筹码', 'error');
                return;
            }
            stompClient.send("/app/room/" + roomId + "/confirmBet", {}, {});
            showToast('已确认下注 ' + myPlayer.pendingBet + ' 筹码', 'success');
        }

        function foldAction() {
            if (!myPlayer || myPlayer.isFolded) return;
            if (confirm('确定要弃牌吗？已投放的筹码不会归还。')) {
                stompClient.send("/app/room/" + roomId + "/fold", {}, {});
                showToast('已弃牌', 'info');
            }
        }

        function winAction() {
            if (!roomData || !roomData.game || roomData.game.pot <= 0) {
                showToast('奖池为空', 'error');
                return;
            }
            if (confirm('确定要获取全部奖池 ' + roomData.game.pot + ' 筹码吗？')) {
                stompClient.send("/app/room/" + roomId + "/win", {}, {});
                showToast('获取了全部奖池！', 'success');
            }
        }

        // ── Modals ──
        function showTransferModal() { document.getElementById('transfer-modal').classList.add('show'); }
        function showBorrowModal() { document.getElementById('borrow-modal').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function submitTransfer() {
            const toUserId = parseInt(document.getElementById('transfer-to').value);
            const amount = parseInt(document.getElementById('transfer-amount').value);
            if (toUserId && amount > 0) {
                stompClient.send("/app/room/" + roomId + "/transfer", {}, JSON.stringify({ toUserId: toUserId, amount: amount }));
                closeModal('transfer-modal');
                document.getElementById('transfer-amount').value = '';
                showToast('转移了 ' + amount + ' 筹码', 'success');
            } else showToast('请选择目标和输入数量', 'error');
        }

        function submitBorrow() {
            const amount = parseInt(document.getElementById('borrow-amount').value);
            if (amount > 0) {
                stompClient.send("/app/room/" + roomId + "/borrow", {}, JSON.stringify({ amount: amount }));
                closeModal('borrow-modal');
                document.getElementById('borrow-amount').value = '';
                showToast('借入了 ' + amount + ' 筹码', 'success');
            } else showToast('请输入有效数量', 'error');
        }

        window.onload = connect;
    </script>
</body>
</html>
