<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 德州扑克计分器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f2f5fa 0%, #e6ecf4 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(255,255,255,0.68);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
        }
        .input-glass {
            background: rgba(255,255,255,0.5);
            border: 1.5px solid rgba(60,60,67,0.1);
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.8);
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
        }
        .btn-primary {
            background: #007AFF;
            box-shadow: 0 4px 16px rgba(0,122,255,0.25);
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,122,255,0.35);
        }
        .btn-primary:active { transform: scale(0.97); }
        .card-enter {
            animation: cardFadeIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="glass rounded-3xl p-8 w-full max-w-md relative z-10 card-enter">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/80 backdrop-blur-sm text-[#007AFF] text-xl shadow-sm mb-4">
                <i class="fas fa-diamond"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">德扑计分器</h1>
            <p class="text-sm text-gray-500 mt-1 font-medium">离线德州扑克筹码管理</p>
        </div>

        <div th:if="${param.error}" class="bg-red-50/80 backdrop-blur-sm border border-red-200/60 text-red-600 p-3.5 rounded-xl mb-6 text-sm font-medium flex items-center gap-2">
            <i class="fas fa-circle-exclamation text-red-400"></i>
            <span>用户名或密码错误</span>
        </div>
        <div th:if="${param.logout}" class="bg-blue-50/80 backdrop-blur-sm border border-blue-200/60 text-blue-600 p-3.5 rounded-xl mb-6 text-sm font-medium flex items-center gap-2">
            <i class="fas fa-circle-info text-blue-400"></i>
            <span>已退出登录</span>
        </div>
        <div th:if="${success}" class="bg-green-50/80 backdrop-blur-sm border border-green-200/60 text-green-600 p-3.5 rounded-xl mb-6 text-sm font-medium flex items-center gap-2">
            <i class="fas fa-circle-check text-green-400"></i>
            <span th:text="${success}">成功</span>
        </div>

        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="far fa-user text-gray-400 mr-1.5"></i>用户名</label>
                <input type="text" name="username" required placeholder="输入用户名" class="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="fas fa-lock text-gray-400 mr-1.5"></i>密码</label>
                <input type="password" name="password" required placeholder="输入密码" class="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" name="remember-me" id="remember-me" class="w-4 h-4 rounded border-gray-300 text-[#007AFF] focus:ring-[#007AFF]">
                <label for="remember-me" class="text-sm font-medium text-gray-500 cursor-pointer">记住我</label>
            </div>
            <button type="submit" class="btn-primary w-full py-3.5 rounded-xl text-base">
                <i class="fas fa-right-to-bracket mr-2"></i>登录
            </button>
        </form>

        <div class="mt-6 text-center">
            <span class="text-sm text-gray-400">还没有账号？</span>
            <a href="/register" class="text-sm font-bold text-[#007AFF] hover:text-[#0066d6] transition-colors ml-1">立即注册</a>
        </div>
    </div>
</body>
</html>
