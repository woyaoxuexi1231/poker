<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 德州扑克计分器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 30%, #fefce8 60%, #fce7f3 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            outline: none;
            font-weight: 500;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }
        .card-enter {
            animation: cardFadeIn 0.6s ease-out both;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            border: 3px solid transparent;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        .avatar-option:hover {
            background: rgba(255,255,255,0.8);
            transform: scale(1.05);
        }
        .avatar-option.selected {
            border-color: #10b981;
            background: rgba(16,185,129,0.1);
            transform: scale(1.05);
            box-shadow: 0 0 0 4px rgba(16,185,129,0.15);
        }
    </style>
</head>
<body>
    <div class="glass rounded-3xl p-8 w-full max-w-md relative z-10 card-enter">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-emerald-600 text-white text-2xl shadow-lg mb-4">
                <i class="fas fa-diamond"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">创建账号</h1>
            <p class="text-sm text-gray-500 mt-1 font-medium">注册一个新账户</p>
        </div>

        <div th:if="${error}" class="bg-red-50/80 backdrop-blur-sm border border-red-200/60 text-red-600 p-3.5 rounded-xl mb-6 text-sm font-medium flex items-center gap-2">
            <i class="fas fa-circle-exclamation text-red-400"></i>
            <span th:text="${error}">错误信息</span>
        </div>

        <form action="/register" method="post" class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="far fa-user text-gray-400 mr-1.5"></i>用户名</label>
                <input type="text" name="username" required placeholder="登录用用户名" class="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="fas fa-lock text-gray-400 mr-1.5"></i>密码</label>
                <input type="password" name="password" required placeholder="设置密码" class="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="far fa-smile text-gray-400 mr-1.5"></i>昵称</label>
                <input type="text" name="nickname" required placeholder="房间内显示的昵称" class="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder:text-gray-400">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 mb-1.5 block"><i class="far fa-images text-gray-400 mr-1.5"></i>选择头像</label>
                <div class="avatar-grid" id="avatar-grid">
                    <div th:each="av : ${avatars}" class="avatar-option" th:data-avatar="${av}" th:text="${av}" onclick="selectAvatar(this)"></div>
                </div>
                <input type="hidden" name="avatar" id="selected-avatar" value="">
                <button type="button" onclick="randomAvatar()" class="mt-2 text-xs font-semibold text-emerald-600 hover:text-emerald-700 transition-colors">
                    <i class="fas fa-dice mr-1"></i>随机分配
                </button>
            </div>
            <button type="submit" class="btn-primary w-full py-3.5 rounded-xl text-base">
                <i class="fas fa-user-plus mr-2"></i>注册
            </button>
        </form>

        <script>
            function selectAvatar(el) {
                document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
                el.classList.add('selected');
                document.getElementById('selected-avatar').value = el.getAttribute('data-avatar');
            }
            function randomAvatar() {
                const options = document.querySelectorAll('.avatar-option');
                const idx = Math.floor(Math.random() * options.length);
                selectAvatar(options[idx]);
            }
            // Random select on page load
            document.addEventListener('DOMContentLoaded', function() {
                randomAvatar();
            });
        </script>

        <div class="mt-6 text-center">
            <span class="text-sm text-gray-400">已有账号？</span>
            <a href="/login" class="text-sm font-bold text-emerald-600 hover:text-emerald-700 transition-colors ml-1">立即登录</a>
        </div>
    </div>
</body>
</html>
